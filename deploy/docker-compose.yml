version: '3.8'

services:
  rust-orchestrator:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.orchestrator
    network_mode: "host" # Required for raw packet capture and eBPF hook mapping
    privileged: true
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
    environment:
      - RUST_LOG=debug
      - VLLM_ENDPOINT=http://127.0.0.1:8000/v1/completions

  vllm-engine:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.vllm
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  triton-server:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.triton
    ports:
      - "8001:8001"
      - "8002:8002"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
