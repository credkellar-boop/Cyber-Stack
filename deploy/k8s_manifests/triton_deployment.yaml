apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberstack-triton-deployment
  namespace: cyber-stack-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triton-server
  template:
    metadata:
      labels:
        app: triton-server
    spec:
      containers:
      - name: tritonserver
        image: cyberstack/triton-engine:latest
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: grpc
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
