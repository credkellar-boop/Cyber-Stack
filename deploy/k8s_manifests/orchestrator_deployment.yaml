apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberstack-orchestrator
  namespace: cyber-stack-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      hostNetwork: true
      containers:
      - name: rust-orchestrator
        image: cyberstack/orchestrator:latest
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - SYS_ADMIN
        volumeMounts:
        - name: sys-fs-bpf
          mountPath: /sys/fs/bpf
      volumes:
      - name: sys-fs-bpf
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
