name: build_and_test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Add any required system apt dependencies here if needed

      - name: Install Zig Compiler
        uses: korandiru/setup-zig@v1
        with:
          zig-version: 0.11.0 # Adjust to your required version

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Execute Unified Master Build Script
        run: |
          chmod +x ./build_scripts/compile_all.sh
          ./build_scripts/compile_all.sh

      - name: Run Rust Unit Tests
        run: cargo test
